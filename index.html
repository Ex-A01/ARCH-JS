<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goozy - Wasm Engine</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: white;
            font-family: sans-serif;
        }
        /* C'est ici que Silk.NET va faire son rendu */
        #canvas {
            width: 800px;
            height: 600px;
            background-color: #000;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        /* --- ECRAN DE CHARGEMENT --- */
        #loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #111;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100; /* Maintient l'écran de chargement au-dessus du jeu */
            overflow: hidden;
            transition: opacity 0.5s ease-out; /* Pour une disparition en douceur à la fin */
        }

        #loading-text {
            font-size: 24px;
            margin-top: 30px;
        }

        /* Animation de l'oiseau */
        #bird {
            width: 100px; /* Ajustez la taille de rachid.png ici */
            height: auto;
            /* L'animation dure 4 secondes, est linéaire (vitesse constante) et boucle à l'infini */
            animation: fly 4s linear infinite; 
        }

        /* Trajectoire de l'oiseau */
        @keyframes fly {
            0% { transform: translateX(-40vw) scaleX(1); } /* Part de la gauche */
            49.9% { transform: translateX(40vw) scaleX(1); } /* Arrive à droite */
            50% { transform: translateX(40vw) scaleX(-1); } /* Se retourne (effet miroir) */
            99.9% { transform: translateX(-40vw) scaleX(-1); } /* Revient à gauche */
            100% { transform: translateX(-40vw) scaleX(1); } /* Se remet à l'endroit */
        }
        
    </style>
</head>
<body>
    <div id="loading-overlay">
        <img id="bird" src="./ralpha.png">
        <div id="loading-text">Chargement du moteur Wasm...</div>
    </div>

    <div id="fpsCounter" style="position: absolute; top: 10px; left: 10px; color: lime; font-family: monospace; font-size: 20px; font-weight: bold; z-index: 10; pointer-events: none; text-shadow: 2px 2px 0px black;">
        
    </div>

    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <script type="module" src="./main.js"></script>
</body>
</html>
