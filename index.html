<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goozy - Wasm Engine</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: white;
            font-family: sans-serif;
        }
        /* C'est ici que Silk.NET va faire son rendu */
        #canvas {
            width: 800px;
            height: 600px;
            background-color: #000;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        #loading {
            position: absolute;
            font-size: 24px;
        }

        /* --- STYLES DU MENU OVERLAY --- */
        #game-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.80); /* Fond noir semi-transparent */
            backdrop-filter: blur(5px); /* Effet de flou sur le jeu en arrière-plan */
            display: flex; /* Masqué par défaut. Change ça par 'flex' si tu veux l'afficher au démarrage */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100; /* Toujours au-dessus du canvas et du FPS counter */
        }

        .menu-btn {
            padding: 15px 30px;
            margin: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.2s, transform 0.1s;
        }

            .menu-btn:hover {
                background-color: #45a049;
                transform: scale(1.05);
            }

        .close-btn {
            margin-top: 40px;
            background-color: #f44336;
        }

            .close-btn:hover {
                background-color: #da190b;
            }
    </style>
</head>
<body>
    <div id="loading">Chargement du moteur Wasm...</div>

    <div id="fpsCounter" style="position: absolute; top: 10px; left: 10px; color: lime; font-family: monospace; font-size: 20px; font-weight: bold; z-index: 10; pointer-events: none; text-shadow: 2px 2px 0px black;">
        FPS: 0
    </div>

    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <div id="game-menu">
        <h1 style="color: #4CAF50; margin-bottom: 5px;">Marketplace Goozy</h1>
        <p style="margin-bottom: 30px; color: #ccc;">Appuyez sur 'Echap' à tout moment pour rouvrir ce menu.</p>

        <button class="menu-btn" onclick="downloadAndLoadLevel('https://localhost/assets/levels/paff.json')">
            🎮 Jouer : Niveau Test Paff
        </button>
        <button class="menu-btn" onclick="downloadAndLoadLevel('https://ton-serveur.com/levels/nouveau_niveau.json')">
            🌍 Jouer : La grande montagne
        </button>

        <button class="menu-btn close-btn" onclick="closeMenu()">
            Retour au jeu
        </button>
    </div>

    <script type="module" src="./main.js"></script>

    <script>
        // Affiche le menu quand le joueur appuie sur Échap
        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") {
                document.getElementById('game-menu').style.display = 'flex';
            }
        });

        function closeMenu() {
            document.getElementById('game-menu').style.display = 'none';
        }

        async function downloadAndLoadLevel(levelUrl) {
            try {
                console.log("[Menu JS] Téléchargement du niveau depuis : " + levelUrl);

                // 1. Fetch le fichier JSON sur le serveur distant
                const response = await fetch(levelUrl);
                if (!response.ok) {
                    throw new Error("Erreur HTTP: " + response.status);
                }

                // 2. Extraire le texte du JSON
                const jsonString = await response.text();
                console.log("[Menu JS] Niveau téléchargé ! Envoi au moteur C#...");

                // 3. Fermer le menu
                closeMenu();

                // 4. Appel Interop C#
                // ATTENTION : Remplace "TonProjetGoozy.dll" par le VRAI nom de ton assembly !
                const { getAssemblyExports } = await globalThis.getDotnetRuntime(0);
                const exports = await getAssemblyExports("TestRenderer.dll");

                exports.Interop.LoadLevelFromWeb(jsonString);

            } catch (error) {
                console.error("[Menu JS] Impossible de charger le niveau : ", error);
                alert("Erreur : Impossible de charger le niveau.\n(Vérifiez la console, c'est souvent une erreur de lien ou de CORS !)");
            }
        }
    </script>
</body>
</html>
